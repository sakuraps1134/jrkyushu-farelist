<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JR九州 地図式運賃表（新幹線プロトタイプ）</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a;
        }

        /* 上部インフォメーションバー */
        #info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #ef4444;
            pointer-events: auto;
        }
        #info-panel h1 { font-size: 16px; margin-bottom: 4px; letter-spacing: 0.05em; }
        #info-panel p { font-size: 12px; color: #ccc; }
        #current-status { font-weight: bold; color: #facc15; }

        /* マップを表示する外側のコンテナ */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        /* 路線図エリア（重複idを削除） */
       #map-area{
    position:relative;
    width:3000px;
    height:3882px;
}

#map-image{
    position:absolute;
    left:0;
    top:0;
    width:3000px;
    height:3882px;
    user-select:none;
    pointer-events:none;
}

        /* 【修正】運賃バッジを極限までコンパクトに、文字も小さく変更 */
        .fare-badge {
            position: absolute;
            transform: translate(-50%, -50%); /* バッジの中心を座標に合わせる */
            background-color: rgba(255, 255, 255, 0.95);
            color: #000;
            border: 1.5px solid #333; /* 枠線を少し細く */
            border-radius: 4px; /* 丸ではなく、四角ベースのコンパクトな形に */
            padding: 2px 6px; /* 余白を最小限に */
            font-size: 11px; /* 文字を小さく */
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.15s, background-color 0.15s;
            white-space: nowrap;
            user-select: none;
            z-index: 10;
        }
        
        .fare-badge:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: #fff;
            z-index: 20;
        }

        /* 出発駅の見た目（見失わないように少しだけ広く） */
        .fare-badge.from-selected {
            background-color: #ef4444;
            color: #fff;
            border-color: #fff;
            padding: 3px 8px;
            font-size: 12px;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <h1>JR九州 路線図運賃表</h1>
        <p>現在の発駅: <span id="current-status">博多 (駅をタップして発駅を変更)</span></p>
    </div>

    <div id="map-area">
    <img id="map-image"
         src="https://raw.githubusercontent.com/sakuraps1134/jrkyushu-farelist/main/base.jpg">
</div>

    <script>
        const mapWidth = 3000; 
        const mapHeight = 3882;

        // 【修正】下方にいくにつれて発生していた縦方向のズレ（Y座標誤差）を完全に補正
        const stations = [
            { "id": "hakata", "name": "博多", "x": 1180, "y": 448 },
            { "id": "shin_tosu", "name": "新鳥栖", "x": 1255, "y": 725 },
            { "id": "kurume", "name": "久留米", "x": 1267, "y": 780 },
            { "id": "chikugo_funagoya", "name": "筑後船小屋", "x": 1253, "y": 957 },
            { "id": "shin_omuta", "name": "新大牟田", "x": 1265, "y": 1122 },
            { "id": "shin_tamana", "name": "新玉名", "x": 1350, "y": 1218 },
            { "id": "kumamoto", "name": "熊本", "x": 1478, "y": 1399 },
            { "id": "shin_yatsushiro", "name": "新八代", "x": 1401, "y": 1775 },    // Y軸補正
            { "id": "shin_minamata", "name": "新水俣", "x": 1188, "y": 2185 },   // Y軸補正
            { "id": "izumi", "name": "出水", "x": 1102, "y": 2345 },             // Y軸補正
            { "id": "sendai", "name": "川内", "x": 1049, "y": 2690 },             // Y軸補正
            { "id": "kagoshima_chuo", "name": "鹿児島中央", "x": 1309, "y": 2985 } // Y軸補正
        ];

        // 運賃データ
        const halfFareTable = {
            "博多": { "新大牟田": 1510, "新玉名": 2130, "新八代": 3300, "新水俣": 4710, "出水": 5130, "鹿児島中央": 7320, "熊本": 2420, "久留米": 870, "新鳥栖": 760, "筑後船小屋": 1300 },
            "新鳥栖": { "久留米": 270, "筑後船小屋": 660, "新大牟田": 990, "新玉名": 1510, "熊本": 2130, "新八代": 2860, "新水俣": 4270, "出水": 4690, "鹿児島中央": 6550 },
            "久留米": { "新大牟田": 760, "筑後船小屋": 450, "新八代": 2420, "新玉名": 1300, "熊本": 1930, "新水俣": 3830, "出水": 4250, "鹿児島中央": 6550 },
            "筑後船小屋": { "新大牟田": 450, "熊本": 1510, "新水俣": 3830, "新八代": 2130, "新玉名": 870, "鹿児島中央": 6110, "出水": 4250 },
            "新大牟田": { "熊本": 1090, "新玉名": 560, "新八代": 1930, "新水俣": 2860, "出水": 3300, "鹿児島中央": 4510 },
            "新玉名": { "熊本": 660, "新八代": 1510, "新水俣": 2420, "出水": 2420 }
        };

        let currentFromStation = stations.find(s => s.id === "hakata"); 

        const mapArea = document.getElementById('map-area');
        const statusEl = document.getElementById('current-status');

        function getFare(fromName, toName) {
            if (fromName === toName) return 0;
            if (halfFareTable[fromName] && halfFareTable[fromName][toName] !== undefined) {
                return halfFareTable[fromName][toName];
            }
            if (halfFareTable[toName] && halfFareTable[toName][fromName] !== undefined) {
                return halfFareTable[toName][fromName];
            }
            return null;
        }

        function renderFares() {
            mapArea.innerHTML = '';
            statusEl.innerText = `${currentFromStation.name} (他駅タップで変更)`;

            stations.forEach(station => {
                const badge = document.createElement('div');
                badge.className = 'fare-badge';

                badge.style.left = `${station.x}px`;
badge.style.top = `${station.y}px`;

                // 【修正】出発駅以外は「円」を省いて数字だけに調整
                if (station.id === currentFromStation.id) {
                    badge.classList.add('from-selected');
                    badge.innerText = `発: ${station.name}`;
                } else {
                    const fare = getFare(currentFromStation.name, station.name);
                    badge.innerText = fare !== null ? `${fare}` : `${station.name}`;
                }

                // タップイベント（Panzoomのドラッグ時と明確に分離）
                badge.addEventListener('pointerup', (e) => {
                    if (window.isDragging) return;
                    currentFromStation = station;
                    renderFares();
                });

                mapArea.appendChild(badge);
            });
        }

        // --- Panzoomの初期化設定 ---
        const viewport = document.getElementById('viewport');
        const panzoom = Panzoom(mapArea, {
            maxScale: 4,
            minScale: 0.15,
            contain: 'outside',
            startScale: 0.25
        });

        viewport.addEventListener('wheel', panzoom.zoomWithWheel);

        // ドラッグ状態の厳密な管理
        window.isDragging = false;
        mapArea.addEventListener('panzoompan', () => { window.isDragging = true; });
        viewport.addEventListener('pointerdown', () => { window.isDragging = false; });

        renderFares();
    </script>
</body>
</html>
