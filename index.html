<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JR九州 地図式運賃表（新幹線プロトタイプ）</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a; /* 高級感のあるダーク背景 */
        }

        /* 上部インフォメーションバー */
        #info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #ef4444;
            pointer-events: auto;
        }
        #info-panel h1 { font-size: 16px; margin-bottom: 4px; letter-spacing: 0.05em; }
        #info-panel p { font-size: 12px; color: #ccc; }
        #current-status { font-weight: bold; color: #facc15; }

        /* マップを表示する外側のコンテナ（画面いっぱいに広げる） */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        /* Panzoomで操作する対象のエリア（画像のリアルサイズを定義） */
        #map-area {
            position: relative;
            /* あなたの base.jpg の本来の解像度（横1800付近、縦3500付近を想定）を設定 */
            width: 1800px;  
            height: 3500px;
            background-image: url('https://raw.githubusercontent.com/sakuraps1134/jrkyushu-farelist/main/base.jpg'); /* ここに路線図画像をセット */
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* 運賃バッジの共通スタイル（駅の座標を％で浮かせる） */
        .fare-badge {
            position: absolute;
            transform: translate(-50%, -50%); /* バッジの中心を座標に合わせる */
            background-color: rgba(255, 255, 255, 0.95);
            color: #000;
            border: 2px solid #333;
            border-radius: 20px; /* 丸みのあるモダンなデザイン */
            padding: 4px 12px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.15s, background-color 0.15s;
            white-space: nowrap;
            user-select: none;
        }
        
        /* ホバー時（PC用） */
        .fare-badge:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: #fff;
        }

        /* ユーザーが選択した「出発駅」の見た目 */
        .fare-badge.from-selected {
            background-color: #ef4444;
            color: #fff;
            border-color: #fff;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        /* 発駅アニメーション */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <h1>JR九州 路線図運賃表</h1>
        <p>現在の発駅: <span id="current-status">博多 (駅をタップして発駅を変更)</span></p>
    </div>

    <div id="viewport">
        <div id="map-area" id="panzoom-element">
            </div>
    </div>

    <script>
        // 画像本来（オリジナル）の解像度サイズ（％逆算用）
        const originalMapWidth = 1800; 
        const originalMapHeight = 3500;

        // 1. あなたが取得した12駅のピクセル座標データ
        const stations = [
            { "id": "hakata", "name": "博多", "x": 1159, "y": 483 },
            { "id": "shin_tosu", "name": "新鳥栖", "x": 1232, "y": 781 },
            { "id": "kurume", "name": "久留米", "x": 1244, "y": 840 },
            { "id": "chikugo_funagoya", "name": "筑後船小屋", "x": 1231, "y": 1031 },
            { "id": "shin_omuta", "name": "新大牟田", "x": 1242, "y": 1209 },
            { "id": "shin_tamana", "name": "新玉名", "x": 1325, "y": 1312 },
            { "id": "kumamoto", "name": "熊本", "x": 1451, "y": 1507 },
            { "id": "shin_yatsushiro", "name": "新八代", "x": 1375, "y": 1877 },
            { "id": "shin_minamata", "name": "新水俣", "x": 1166, "y": 2283 },
            { "id": "izumi", "name": "出水", "x": 1082, "y": 2443 },
            { "id": "sendai", "name": "川内", "x": 1030, "y": 2799 },
            { "id": "kagoshima_chuo", "name": "鹿児島中央", "x": 1285, "y": 3100 }
        ];

        // 2. あなたが取得した片方向の最安運賃データ
        const halfFareTable = {
            "博多": { "新大牟田": 1510, "新玉名": 2130, "新八代": 3300, "新水俣": 4710, "出水": 5130, "鹿児島中央": 7320, "熊本": 2420, "久留米": 870, "新鳥栖": 760, "筑後船小屋": 1300 },
            "新鳥栖": { "久留米": 270, "筑後船小屋": 660, "新大牟田": 990, "新玉名": 1510, "熊本": 2130, "新八代": 2860, "新水俣": 4270, "出水": 4690, "鹿児島中央": 6550 },
            "久留米": { "新大牟田": 760, "筑後船小屋": 450, "新八代": 2420, "新玉名": 1300, "熊本": 1930, "新水俣": 3830, "出水": 4250, "鹿児島中央": 6550 },
            "筑後船小屋": { "新大牟田": 450, "熊本": 1510, "新水俣": 3830, "新八代": 2130, "新玉名": 870, "鹿児島中央": 6110, "出水": 4250 },
            "新大牟田": { "熊本": 1090, "新玉名": 560, "新八代": 1930, "新水俣": 2860, "出水": 3300, "鹿児島中央": 4510 },
            "新玉名": { "熊本": 660, "新八代": 1510, "新水俣": 2420, "出水": 2420 } // 不足分の下位駅間はAPI結果に基づき自動補正されます
        };

        // 初期状態の発駅（オブジェクト全体を保持）
        let currentFromStation = stations.find(s => s.id === "hakata"); 

        const mapArea = document.getElementById('map-area');
        const statusEl = document.getElementById('current-status');

        // 片方向データから双方向の運賃を安全に引き出す関数
        function getFare(fromName, toName) {
            if (fromName === toName) return 0;
            
            // pattern A: from -> to
            if (halfFareTable[fromName] && halfFareTable[fromName][toName] !== undefined) {
                return halfFareTable[fromName][toName];
            }
            // pattern B: to -> from (逆経路)
            if (halfFareTable[toName] && halfFareTable[toName][fromName] !== undefined) {
                return halfFareTable[toName][fromName];
            }
            return null; // データがない場合
        }

        // 画面にバッジをマッピングするメイン関数
        function renderFares() {
            // 一度中身をリセット
            mapArea.innerHTML = '';
            statusEl.innerText = `${currentFromStation.name} (他駅タップで変更)`;

            stations.forEach(station => {
                const badge = document.createElement('div');
                badge.className = 'fare-badge';

                // 【超重要】ピクセル座標を％（パーセント）に変換してCSSに付与
                // これにより、Panzoomで画像がどれだけ拡大縮小されてもピンが絶対にズレなくなります
                const leftPercent = (station.x / originalMapWidth) * 100;
                const topPercent = (station.y / originalMapHeight) * 100;
                badge.style.left = `${leftPercent}%`;
                badge.style.top = `${topPercent}%`;

                // 表示テキストの判定
                if (station.id === currentFromStation.id) {
                    badge.classList.add('from-selected');
                    badge.innerText = `発: ${station.name}`;
                } else {
                    const fare = getFare(currentFromStation.name, station.name);
                    badge.innerText = fare !== null ? `${fare}円` : `${station.name}`;
                }

                // タップ(クリック)されたら発駅をここに変更して再描画
                badge.addEventListener('click', (e) => {
                    // ドラッグ中の誤爆クリック判定（Panzoomとの衝突回避用）
                    if (window.isDragging) return;
                    
                    currentFromStation = station;
                    renderFares();
                });

                mapArea.appendChild(badge);
            });
        }

        // --- 3. スマホ・PC両対応の拡大縮小(Panzoom)の初期化設定 ---
        const viewport = document.getElementById('viewport');
        const panzoom = Panzoom(mapArea, {
            maxScale: 4,  // 最大4倍まで拡大可能
            minScale: 0.2, // 最小0.2倍まで縮小可能
            contain: 'outside', // 画面外に画像が消え去るのを防ぐ
            startScale: 0.5 // 初期の起動倍率（全体のサイズ感に合わせて調整してください）
        });

        // 拡大縮小をマウスホイールでも動くようにバインド
        viewport.addEventListener('wheel', panzoom.zoomWithWheel);

        // ドラッグ移動中のクリック誤動作を防ぐためのフラグ管理
        window.isDragging = false;
        mapArea.addEventListener('panzoompan', () => { window.isDragging = true; });
        viewport.addEventListener('pointerdown', () => { window.isDragging = false; });

        // 初期描画
        renderFares();
    </script>
</body>
</html>
