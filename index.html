<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JR九州 地図式運賃表（新幹線プロトタイプ）</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a1a; /* 高級感のあるダーク背景 */
        }

        /* 上部インフォメーションバー */
        #info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid #ef4444;
            pointer-events: auto;
        }
        #info-panel h1 { font-size: 16px; margin-bottom: 4px; letter-spacing: 0.05em; }
        #info-panel p { font-size: 12px; color: #ccc; }
        #current-status { font-weight: bold; color: #facc15; }

        /* マップを表示する外側のコンテナ */
        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }

        /* あなたが調整してくれた正しい解像度 */
        #map-area {
            position: relative;
            width: 3000px;  
            height: 3882px;
            background-image: url('https://raw.githubusercontent.com/sakuraps1134/jrkyushu-farelist/main/base.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* 運賃バッジの共通スタイル */
        .fare-badge {
            position: absolute;
            transform: translate(-50%, -50%); /* バッジの中心を座標に合わせる */
            background-color: rgba(255, 255, 255, 0.95);
            color: #000;
            border: 2px solid #333;
            border-radius: 20px; 
            padding: 6px 14px;
            font-size: 14px; /* 3000pxのマップで見やすいように少し大きく調整 */
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.15s, background-color 0.15s;
            white-space: nowrap;
            user-select: none;
        }
        
        .fare-badge:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: #fff;
        }

        /* 出発駅の見た目 */
        .fare-badge.from-selected {
            background-color: #ef4444;
            color: #fff;
            border-color: #fff;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <h1>JR九州 路線図運賃表</h1>
        <p>現在の発駅: <span id="current-status">博多 (駅をタップして発駅を変更)</span></p>
    </div>

    <div id="viewport">
        <div id="map-area"></div>
    </div>

    <script>
        // 【修正】現在のマップ画像の解像度を基準に設定
        const mapWidth = 3000; 
        const mapHeight = 3882;

        // 【修正】3000 × 3882 の路線図画像にジャストフィットするように位置座標を再計算
        const stations = [
            { "id": "hakata", "name": "博多", "x": 1180, "y": 448 },
            { "id": "shin_tosu", "name": "新鳥栖", "x": 1255, "y": 725 },
            { "id": "kurume", "name": "久留米", "x": 1267, "y": 780 },
            { "id": "chikugo_funagoya", "name": "筑後船小屋", "x": 1253, "y": 957 },
            { "id": "shin_omuta", "name": "新大牟田", "x": 1265, "y": 1122 },
            { "id": "shin_tamana", "name": "新玉名", "x": 1350, "y": 1218 },
            { "id": "kumamoto", "name": "熊本", "x": 1478, "y": 1399 },
            { "id": "shin_yatsushiro", "name": "新八代", "x": 1401, "y": 1742 },
            { "id": "shin_minamata", "name": "新水俣", "x": 1188, "y": 2119 },
            { "id": "izumi", "name": "出水", "x": 1102, "y": 2268 },
            { "id": "sendai", "name": "川内", "x": 1049, "y": 2598 },
            { "id": "kagoshima_chuo", "name": "鹿児島中央", "x": 1309, "y": 2877 }
        ];

        // 2. 最安運賃データ
        const halfFareTable = {
            "博多": { "新大牟田": 1510, "新玉名": 2130, "新八代": 3300, "新水俣": 4710, "出水": 5130, "鹿児島中央": 7320, "熊本": 2420, "久留米": 870, "新鳥栖": 760, "筑後船小屋": 1300 },
            "新鳥栖": { "久留米": 270, "筑後船小屋": 660, "新大牟田": 990, "新玉名": 1510, "熊本": 2130, "新八代": 2860, "新水俣": 4270, "出水": 4690, "鹿児島中央": 6550 },
            "久留米": { "新大牟田": 760, "筑後船小屋": 450, "新八代": 2420, "新玉名": 1300, "熊本": 1930, "新水俣": 3830, "出水": 4250, "鹿児島中央": 6550 },
            "筑後船小屋": { "新大牟田": 450, "熊本": 1510, "新水俣": 3830, "新八代": 2130, "新玉名": 870, "鹿児島中央": 6110, "出水": 4250 },
            "新大牟田": { "熊本": 1090, "新玉名": 560, "新八代": 1930, "新水俣": 2860, "出水": 3300, "鹿児島中央": 4510 },
            "新玉名": { "熊本": 660, "新八代": 1510, "新水俣": 2420, "出水": 2420 }
        };

        let currentFromStation = stations.find(s => s.id === "hakata"); 

        const mapArea = document.getElementById('map-area');
        const statusEl = document.getElementById('current-status');

        function getFare(fromName, toName) {
            if (fromName === toName) return 0;
            if (halfFareTable[fromName] && halfFareTable[fromName][toName] !== undefined) {
                return halfFareTable[fromName][toName];
            }
            if (halfFareTable[toName] && halfFareTable[toName][fromName] !== undefined) {
                return halfFareTable[toName][fromName];
            }
            return null;
        }

        function renderFares() {
            mapArea.innerHTML = '';
            statusEl.innerText = `${currentFromStation.name} (他駅タップで変更)`;

            stations.forEach(station => {
                const badge = document.createElement('div');
                badge.className = 'fare-badge';

                // 3000x3882の新しいサイズを元にパーセント位置を適用
                const leftPercent = (station.x / mapWidth) * 100;
                const topPercent = (station.y / mapHeight) * 100;
                badge.style.left = `${leftPercent}%`;
                badge.style.top = `${topPercent}%`;

                if (station.id === currentFromStation.id) {
                    badge.classList.add('from-selected');
                    badge.innerText = `発: ${station.name}`;
                } else {
                    const fare = getFare(currentFromStation.name, station.name);
                    badge.innerText = fare !== null ? `${fare}円` : `${station.name}`;
                }

                badge.addEventListener('click', (e) => {
                    if (window.isDragging) return;
                    currentFromStation = station;
                    renderFares();
                });

                mapArea.appendChild(badge);
            });
        }

        // --- Panzoomの初期化設定 ---
        const viewport = document.getElementById('viewport');
        const panzoom = Panzoom(mapArea, {
            maxScale: 4,
            minScale: 0.15,
            contain: 'outside',
            startScale: 0.25 // 3000pxと巨大な画像なので、初期表示時に全体が見えやすいよう縮小起動させます
        });

        viewport.addEventListener('wheel', panzoom.zoomWithWheel);

        window.isDragging = false;
        mapArea.addEventListener('panzoompan', () => { window.isDragging = true; });
        viewport.addEventListener('pointerdown', () => { window.isDragging = false; });

        renderFares();
    </script>
</body>
</html>
